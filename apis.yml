description: >-
  Dr Pepper Snapple Group was an integrated brand owner, manufacturer, and
  distributor of nonalcoholic beverages in the United States, Canada, Mexico,
  and the Caribbean. In 2018 the company merged with Keurig Green Mountain to
  form Keurig Dr Pepper, a leading beverage company in North America with a
  portfolio of more than 150 brands including Dr Pepper, 7UP, Snapple, Canada
  Dry, Keurig, and Peet's Coffee.
